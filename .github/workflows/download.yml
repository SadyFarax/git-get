name: Multi Downloader

on:
  workflow_dispatch:
    inputs:
      tasks_json:
        description: 'JSON array of tasks (direct/git/website)'
        required: true
        type: string
        default: |
          [
            {"type":"direct","url":"https://example.com/file.zip"}
          ]
      output_zip:
        description: 'Output ZIP file name'
        required: false
        type: string
        default: 'final_download.zip'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
      - name: Run downloader
        env:
          TASKS_JSON: ${{ github.event.inputs.tasks_json }}
          ZIP_NAME: ${{ github.event.inputs.output_zip }}
        run: python downloader.py
      - uses: actions/upload-artifact@v4
        with:
          name: downloaded-files
          path: ${{ github.event.inputs.output_zip }}
